<!DOCTYPE html>

  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: "Poppins", sans-serif;
    }

    body {
      background: radial-gradient(circle at center, #001020, #000000);
      color: white;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
      overflow: hidden;
    }

    .logo {

    h1 {

    }

    p {

      color: #b0c7d6;
      margin-bottom: 30px;
    }

    .btn {
      background: linear-gradient(90deg, #00cfff, #0066ff);
      color: white;
      border: none;
      padding: 14px 32px;
      font-size: 1.1rem;
      border-radius: 50px;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
      text-decoration: none;
    }

    .btn:hover {
      transform: scale(1.05);
      box-shadow: 0 0 20px #00cfff;
    }

    footer {
      position: absolute;
      bottom: 20px;
      font-size: 0.9rem;
      color: #88a;
    }

    footer a {
      color: #00cfff;
      text-decoration: none;
    }

    footer a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <img src="asixtore.png" alt="Logo Asixtore" class="logo" />

  Como instalar en windows 10 y 11

  <div style="margin: 5px 0;">
    <video
      id="presentacionVideo"
      width="125"
      controls
      poster="asixtore.png"
      style="border-radius: 16px; box-shadow: 0 0 24px #00cfff55; transition: width 0.3s, height 0.3s;"
    >
      <source src="https://github.com/supervic1123/asixtore/raw/main/video.mp4" type="video/mp4">
      Tu navegador no soporta la reproducción de video.

  </footer>
  <script>
    const video = document.getElementById('presentacionVideo');
    const originalWidth = 125;

    // Intenta poner el video en pantalla completa al reproducir
    function expandVideo() {
      if (video.requestFullscreen) {
        video.requestFullscreen();
      } else if (video.webkitRequestFullscreen) {
        video.webkitRequestFullscreen();
      } else if (video.msRequestFullscreen) {
        video.msRequestFullscreen();
      }
      // Aumenta el tamaño también por si fullscreen falla
      video.style.width = Math.min(window.innerWidth * 0.5, 600) + 'px';
      video.style.zIndex = 10;
      video.style.position = 'relative';
      video.style.boxShadow = '0 0 32px #00cfff99';
    }

    function shrinkVideo() {
      // Sale de pantalla completa si está activo
      if (document.fullscreenElement || document.webkitFullscreenElement || document.msFullscreenElement) {
        if (document.exitFullscreen) {
          document.exitFullscreen();
        } else if (document.webkitExitFullscreen) {
          document.webkitExitFullscreen();
        } else if (document.msExitFullscreen) {
          document.msExitFullscreen();
        }
      }
      video.style.width = originalWidth + 'px';
      video.style.zIndex = '';
      video.style.position = '';
      video.style.boxShadow = '0 0 24px #00cfff55';
    }

    video.addEventListener('play', expandVideo);
    video.addEventListener('pause', shrinkVideo);
    video.addEventListener('ended', shrinkVideo);

    // Si el usuario sale de pantalla completa manualmente, también reducir
    video.addEventListener('webkitfullscreenchange', () => {
      if (!document.webkitIsFullScreen) shrinkVideo();
    });
    video.addEventListener('fullscreenchange', () => {
      if (!document.fullscreenElement) shrinkVideo();
    });
  </script>
